_target_: jepa.JEPA

# DINOv2-small (ViT-S/14): 384-dim CLS token output
encoder:
  _target_: stable_pretraining.backbone.utils.vit_hf
  size: small
  patch_size: 14
  image_size: ${img_size}
  pretrained: false
  use_mask_token: false

predictor:
  _target_: module.ARPredictor
  num_frames: ${history_size}
  input_dim: ${embed_dim}
  hidden_dim: ${embed_dim}
  output_dim: ${embed_dim}
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

# WebActionEncoder: handles click/type/scroll/drag/navigate actions
action_encoder:
  _target_: module.WebActionEncoder
  emb_dim: ${embed_dim}
  num_action_types: 8
  max_text_len: 15

# Projector maps DINOv2-small (384-dim) CLS token → embed_dim
projector:
  _target_: module.MLP
  input_dim: ${embed_dim}
  output_dim: ${embed_dim}
  hidden_dim: 2048
  norm_fn:
    _target_: torch.nn.BatchNorm1d
    _partial_: true

pred_proj:
  _target_: module.MLP
  input_dim: ${embed_dim}
  output_dim: ${embed_dim}
  hidden_dim: 2048
  norm_fn:
    _target_: torch.nn.BatchNorm1d
    _partial_: true
